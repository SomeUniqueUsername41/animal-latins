<!DOCTYPE html>
<html>
<head>
  <title>Animal Latin Translator</title>
  <style>
    #input-form {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    textarea,
    .output-box {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      max-width: 800px;
      height: 150px;
      text-align: left;
      font-family: Arial, sans-serif;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="input-form">
    <label for="input">Enter text here</label>
    <textarea id="input"></textarea>

    <label for="animal-select">Select Animal Latin</label>
    <select id="animal-select">
      <option value="ay">Pig Latin</option>
      <option value="ack">Duck Latin</option>
      <option value="eak">Mouse Latin</option>
      <option value="uck">Chicken Latin</option>
      <option value="oot">Monkey Latin</option>
      <option value="ark">Dog Latin</option>
      <option value="oak">Frog Latin</option>
      <option value="iss">Snake Latin</option>
      <option value="irp">Bird Latin</option>
      <option value="onk">Goose Latin</option>
      <option value="out">Crocodile Latin</option>
      <option value="er">Deer Latin</option>
      <option value="ell">Turtle Latin</option>
      <option value="orn">Goat Latin</option>
      <option value="aw">Bear Latin</option>
      <option value="awk">Parrot Latin</option>
      <option value="ale">Lizard Latin</option>
      <option value="ipe">Zebra Latin</option>
      <option value="ane">Lion Latin</option>
      <option value="ut">Squirrel Latin</option>
      <option value="ump">Camel Latin</option>
      <option value="unk">Elephant Latin</option>
      <option value="oof">Horse Latin</option>
      <option value="eb">Spider Latin</option>
      <option value="op">Rabbit Latin</option>
    </select>
  </div>

  <div>
    <label for="output">Translation</label>
    <textarea id="output" class="output-box" readonly></textarea>
  </div>

  <script>
    let input = document.getElementById("input");
    let animalSelect = document.getElementById("animal-select");
    let output = document.getElementById("output");

    input.addEventListener("input", updateOutput);
    animalSelect.addEventListener("change", updateOutput);

    function updateOutput() {
      output.value = translateToAnimalLatin(input.value, animalSelect.value);
    }

    function translateToAnimalLatin(text, suffix) {
      let tokens = text.split(/([A-Za-z]+(?:'[A-Za-z]+)*|-|\.)/);
      let result = [];

      for (let i = 0; i < tokens.length; i++) {
        let token = tokens[i];

        // sci-fi special case
        if (
          /^[A-Za-z]+$/.test(token) &&
          tokens[i + 1] === "-" &&
          /^[A-Za-z]+$/.test(tokens[i + 2])
        ) {
          let combined = (token + "-" + tokens[i + 2]).toLowerCase();

          if (combined === "sci-fi") {
            result.push("i-fisc" + suffix);
          } else {
            result.push(
              translateWord(token, suffix) +
              "-" +
              translateWord(tokens[i + 2], suffix)
            );
          }

          i += 2;
          continue;
        }

        if (!/^[A-Za-z]+(?:'[A-Za-z]+)*$/.test(token)) {
          result.push(token);
          continue;
        }

        // NEW RULE: skip abbreviations like "Dr", "Mr", "TV"
        if (isConsonantAbbreviation(token)) {
          result.push(token);
          continue;
        }

        result.push(translateWord(token, suffix));
      }

      return result.join("");
    }

    function isConsonantAbbreviation(word) {
      let lower = word.toLowerCase();

      // must be 2+ letters, no vowels at all
      if (lower.length < 2) return false;

      return !/[aeiou]/.test(lower);
    }

    function translateWord(token, suffix) {
      if (token.length === 1 && !/^[AaIi]$/.test(token)) return token;

      let isAllCaps = token.length >= 2 && token === token.toUpperCase();
      let startsWithCapital = token[0] === token[0].toUpperCase();
      let lower = token.toLowerCase();

      let translated;

      if (lower.startsWith("qu")) {
        translated = lower.slice(2) + "qu" + suffix;
      } else if (startsWithHyRule(lower)) {
        translated = lower.slice(1) + "h" + suffix;
      } else {
        let firstVowelIndex = getFirstVowelIndex(lower);

        if (firstVowelIndex === 0) {
          translated = lower + "w" + suffix;
        } else {
          let cluster = lower.slice(0, firstVowelIndex);
          let rest = lower.slice(firstVowelIndex);
          translated = rest + cluster + suffix;
        }
      }

      if (isAllCaps) {
        translated = translated.toUpperCase();
      } else if (startsWithCapital) {
        translated = translated.charAt(0).toUpperCase() + translated.slice(1);
      }

      return translated;
    }

    function startsWithHyRule(word) {
      const hyWords = [
        "hyena","hyaena","hybrid","hyper","hyperactive","hyperactivity",
        "hygiene","hyacinth","hydrogen","hydrogenation","hyphen",
        "hyphenate","hyphenated","hypertrophy","hypertrophic",
        "hypothesis","hypotheses","hyaluronic","hydration","hydrated","hydra"
      ];

      return word.startsWith("hy") || hyWords.includes(word);
    }

    function getFirstVowelIndex(word) {
      let match = word.search(/[aeiou]/);
      if (match !== -1) return match;
      return word.search(/y/);
    }
  </script>
</body>
</html>
